<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sedang Maintenance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .icon {
            font-size: 60px;
            color: #007bff;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        p {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .back-button {
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Ikon Sederhana (bisa diganti gambar/SVG) -->
        <div class="icon">🛠️</div>
        <h1>Kami Sedang Perbaikan</h1>
        <p>Maaf atas ketidaknyamanannya. Website sedang dalam pemeliharaan rutin untuk memberikan pengalaman yang lebih baik. Kami akan segera kembali!</p>
        
        <!-- Tombol Back/Kembali -->
        <a href="javascript:history.back()" class="back-button">Kembali ke Halaman Sebelumnya</a>
    </div>
</body>
</html>
